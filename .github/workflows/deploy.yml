name: Deploy to Surge.sh

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Add 200.html for SPA routing
        run: cp ./out/index.html ./out/200.html

      - name: Deploy to Surge
        run: npx surge ./out cor-e-lar.surge.sh --token ${{ secrets.SURGE_TOKEN }}
